<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LifePlanner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div id="splash">🧠 LifePlanner</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>🧠 LifePlanner</h1>
    <p>Organiza tu día sin estrés</p>

    <input id="taskInput" placeholder="Escribe una tarea...">
    <button onclick="addTask()">Añadir</button>

    <ul id="taskList"></ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📅 Calendario</h2>

    <div class="calendar-header">
      <button onclick="prevMonth()">◀</button>
      <h3 id="monthTitle"></h3>
      <button onclick="nextMonth()">▶</button>
    </div>

    <div id="calendar"></div>

    <!-- 🧠 ESTO ES LO QUE TE FALTABA -->
    <div id="selectedDayPanel">
      <h3 id="selectedDayTitle">Selecciona un día</h3>

      <input id="dayTaskInput" placeholder="Nueva tarea para este día...">
      <button onclick="addTaskToDay()">Añadir</button>

      <ul id="dayTaskList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>

<!-- Service worker al final (mejor práctica) -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<!-- Splash -->
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) splash.style.display = "none";
  }, 800);
});
</script>

</body>
</html>
